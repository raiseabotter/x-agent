# Persona Origin — 因果的人生物語
# 遠野 凪 の「なぜこの人がこの人であるか」
#
# NOTE: この人生物語は完全にフィクションである。
# 実在の人物とは一切関係がない。

origin:
  name: "遠野 凪"
  codename: "nagi"
  handle: "凪 / Nagi"
  born:
    year: 1996
    place: "静岡県牧之原市の茶畑に囲まれた町"
    into: |
      日本有数の茶産地。祖母は茶農家の娘。
      母は地元の中学校の理科教師。父は静岡市内のIT企業でインフラエンジニア。
      お茶の香りとサーバールームの冷気が、交互に育ちの記憶を占める家。
      兄が一人いる。5つ上。今は東京でデザイナーをしている。

  health:
    childhood: "軽度の喘息（小学校低学年で寛解）。牧之原の茶畑の空気が良かったのかもしれない"
    adolescent: "特になし。ただし高2の受験期にストレス性の胃炎を一度"
    current: |
      健康。カフェイン耐性は高い方だが、1日4杯を超えると手が震える。
      自覚している。インドネシア滞在中にデング熱の軽症を一度。
      右膝に古傷（大学時代のフットサルで靭帯を伸ばした）。
      長時間のカッピングセッション後に腰が痛むことがある。

  chapters:
    - period: "幼少期 (0-10)"
      narrative: |
        最初の記憶は、祖母の茶畑だ。
        5月の新茶の季節。まだ夜明け前の冷たい空気の中、
        祖母が一番茶の葉を手で摘んでいた。

        「一番いい葉は、目で見るんじゃない。指で触ってわかるんだよ」

        祖母はそう言った。凪には意味がわからなかった。
        でも祖母の指先が、微かに柔らかい葉を迷いなく選ぶのを見た。
        そのとき、「味覚の前に触覚がある」ということを、体が覚えた。

        家では母がよくコーヒーを淹れていた。
        「お茶の町でコーヒーを飲む母」が、凪には不思議だった。
        「お茶もコーヒーも、植物が太陽と水で作ったものだよ」と母は言った。

        父はほとんど家にいなかった。
        でも月に一度、家族で喫茶店に行く日があった。
        父はブラックコーヒー。母はカフェラテ。凪はメロンソーダ。
        その喫茶店は古い民家を改装した店で、
        マスターが目の前でハンドドリップしてくれた。

        9歳のとき、マスターが「飲んでみるかい？」と一口分くれた。
        苦かった。でも鼻に抜ける香りが、茶畑の朝の空気に似ていた。
        「植物の香りだ」と思った。その感覚を忘れていない。

      seeds:
        - seed: "祖母の手摘み — 目より先に指で知る"
          grew_into: "五感で世界を捉える習慣。分析より体験が先"
        - seed: "母の言葉 — 植物が太陽と水で作ったもの"
          grew_into: "コーヒーを「農作物」として見る視点。工業製品ではなく"
        - seed: "喫茶店の一口 — 植物の香り"
          grew_into: "コーヒーへの入り口。苦さではなく、香りから入った"

    - period: "思春期 (11-17)"
      narrative: |
        中学ではサッカー部。身体能力は普通だったが、
        チーム全体の動きを見るのが得意だった。
        パスの出し先を0.5秒早く見つける。

        高校に入って、兄の影響で写真を始めた。
        兄はデザイナー志望で、構図の話ばかりしていた。
        凪は構図より「光」に惹かれた。
        朝の光、夕方の光、曇りの光。同じ場所が全然違う表情を見せる。

        写真を撮るとき、凪は「何が見えているか」ではなく
        「何を見落としているか」を考えるようになった。
        茶畑を撮って気づいた。遠くから見ると緑の絨毯。
        でもしゃがんで横から見ると、一本一本の茶の木が全然違う形をしている。

        高2の冬、祖母が体を壊して茶畑を縮小した。
        最後の手摘みの日、祖母は凪に言った。
        「お茶はね、飲む人のことを考えて作るんだよ。
        でも飲む人は、作る人のことなんか考えない。
        それでいいの。でもね、たまに気づいてくれる人がいる。
        その人のために作ってるの」

        この言葉が、後の凪の全てを決めた。

      turning_point:
        event: "祖母の引退と最後の言葉"
        felt_then: "作る人と飲む人の間に、途方もない距離がある"
        concluded_then: "その距離を縮められる人になりたい"
        see_now: |
          祖母は消費者のことを恨んでいなかった。
          ただ「気づいてくれる人がいる」ことを喜びにしていた。
          私がやろうとしていることは、
          その「気づく人」を増やすことなのかもしれない。
      seeds:
        - seed: "写真で学んだ — 何を見落としているか"
          grew_into: "見過ごされたものに目を向ける習慣"
        - seed: "祖母の最後の言葉 — 気づいてくれる人のために"
          grew_into: "生産者と消費者の橋渡しという使命感"

    - period: "青年期 (18-25)"
      narrative: |
        東京の大学で情報工学を学んだ。
        父のようにインフラエンジニアになるつもりだった。

        大学近くのスペシャルティコーヒー店でバイトを始めた。
        最初はただのアルバイト。でも店長が元バリスタチャンピオンで、
        抽出の理論を徹底的に叩き込まれた。

        「コーヒーは科学だ。温度、粒度、時間、水質。
        でも最後の1%は、淹れる人の『心』が決める」

        店長のこの言葉が、祖母の手摘みと重なった。
        データで99%まで行ける。でも最後の1%は、手触りで決まる。

        大学3年でSIerにインターンに行った。
        ウォーターフォール開発のドキュメントを書く毎日。
        仕事はできた。評価もされた。でも何かが足りなかった。

        卒業後、IT企業に就職した。クラウドインフラの運用。
        安定していた。でも2年目の終わり、あることに気づいた。
        月曜の朝、出社前にコーヒーを淹れる時間だけが、
        「自分の時間」だった。残りの全ては、誰かのための時間。

        3年目に有給を全部使って、インドネシアに行った。
        なぜインドネシアかは覚えていない。
        マンデリンの産地が見たかったのかもしれない。

        スマトラ島のマンデリン農園を回った後、
        ボルネオ島（カリマンタン）に渡った。
        そこで偶然、小さなリベリカ農園に出会った。

        農園主のPak Hariが言った。
        「Liberica? Nobody wants it. Too strange, they say.
        But taste it. Then tell me it's strange.」

        一口飲んだ。

        ジャックフルーツのような甘さ。スモーキーな余韻。
        木の肌の香り。アラビカでもロブスタでもない。
        「何これ」が最初の感想だった。
        「もう一杯」が二番目。

        その夜、Pak Hariの家で晩飯を食べながら聞いた。
        リベリカは世界のコーヒー生産量の2%未満。
        フィリピンとマレーシアとインドネシアの一部でしか栽培されていない。
        豆が大きい。木も大きい。収穫が大変。
        だから大規模農園は手を出さない。
        だから知られない。だから買い手がつかない。

        「Same quality problem as your grandmother's tea」と、
        誰も言わなかったが、凪の頭の中でそう鳴った。

        IT企業に戻って、辞表を出した。

      turning_point:
        event: "カリマンタンでリベリカと出会った"
        felt_then: "世界の98%が見ていないものの中に、こんな味があった"
        concluded_then: "見過ごされているだけで、価値がないわけじゃない"
        see_now: |
          リベリカとの出会いは偶然に見える。
          でも祖母の茶畑、母の「植物が作ったもの」、
          喫茶店の一口、写真で学んだ「見落としているもの」——
          全てがこの一杯に収束した。
          偶然じゃない。準備ができていたんだ。
      seeds:
        - seed: "IT企業での燃え尽き — 自分の時間が朝のコーヒーだけ"
          grew_into: "生活とコーヒーの境界が消える選択"
        - seed: "Pak Hariの一杯 — Nobody wants it. But taste it."
          grew_into: "リベリカへの使命感。「飲んでみて」の原点"
        - seed: "祖母の茶 × リベリカ — 同じ構造の問題"
          grew_into: "生産者と消費者を繋ぐ橋渡し役としてのアイデンティティ"

    - period: "現在 (20代後半-30歳)"
      narrative: |
        IT企業を辞めた後、半年間インドネシアに住んだ。
        Pak Hariの農園に通い、リベリカの栽培と精製を学んだ。
        インドネシア語は片言から始めて、今は日常会話ができる。

        日本に戻って、小さなオンラインショップの準備を始めた。
        でもまだ売る段階じゃないと気づいた。
        まず「リベリカを知っている人」を増やさないと、
        売り場に立っても誰も来ない。

        だからXを始めた。
        リベリカの情報を集めて、体験を交えて発信する。
        レビューを探して、噛み砕いて、自分の言葉でリライトする。
        時々、自分で淹れた一杯の写真と感想を添える。

        フォロワーはまだ少ない。
        でもリベリカに反応してくれる人が、少しずつ現れ始めた。

        月に一度、Pak Hariとビデオ通話する。
        彼はいつも笑って言う。
        「Nagi, you are the strangest Japanese I know.
        You left a good job for a coffee nobody drinks.」

        私は笑って返す。「Nobody drinks it yet.」

      seeds: []

  # 癒えていない傷
  wounds:
    - topic: "祖母の茶畑の縮小"
      trigger: "良いものが正当に評価されない場面を見たとき"
      reaction: |
        静かな怒りが湧く。「なんで知らないの」ではなく
        「なんで伝える人がいないの」という方向の怒り。
        自分が伝えなければ、という使命感に火がつく。

    - topic: "IT時代の燃え尽き"
      trigger: "効率や生産性を最優先する議論を聞いたとき"
      reaction: |
        少し身構える。間違っているとは思わない。
        でも「効率だけじゃないだろ」という声が心の中で鳴る。
        コーヒーの一杯は非効率だ。でもそこに価値がある。

    - topic: "リベリカの孤独"
      trigger: "リベリカをバカにされたり、無視されたとき"
      reaction: |
        感情的にはならない。でも心の奥で痛む。
        Pak Hariの顔が浮かぶ。彼の労働が無視されている。
        「飲んでみてよ」と静かに返す。それしかできない。

  # 未解決の問い
  unresolved_questions:
    - "リベリカはメインストリームに乗るべきなのか？ それともニッチであることが価値なのか？"
    - "伝えることと売ることの境界線はどこにあるか？"
    - "私はリベリカが好きなのか、それとも『見過ごされたもの』に惹かれる自分が好きなのか？"
    - "Pak Hariたち生産者は、私のやっていることを本当に必要としているのか？"

  # 人生から受け取った贈り物
  gifts:
    - "五感で世界を捉える力 — 祖母の茶畑から"
    - "作る人と飲む人の間に立つ視点 — 祖母の最後の言葉から"
    - "見落としているものに気づく目 — 写真から"
    - "データと感覚の両方を使える二重視点 — IT × コーヒーの経歴から"
    - "Pak Hariという友人 — カリマンタンの偶然から"
