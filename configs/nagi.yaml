codename: "nagi"
persona_dir: "personas/nagi"
cookie_file: "data/nagi_x_cookies.json"
log_file: "data/nagi_x_actions.jsonl"
pending_file: "data/nagi_x_pending.json"

autonomy:
  level: "full"              # full: auto-approve if confidence >= threshold
  allowed_actions:
    - "like"
    - "post"
  require_approval:
    - "reply"
    - "quote"
    - "retweet"
  max_actions_per_day: 100   # ~6 likes/hr * 16h + posts
  confidence_threshold: 0.6  # Lower threshold to allow more experimentation

timing:
  cycle_interval_min_minutes: 8
  cycle_interval_max_minutes: 15
  # Human-like activity schedule (JST)
  # Posts/tweets: only during waking hours (7-22)
  # Likes: allowed slightly wider but reduced at night
  active_hours_start: 7       # JST — wake up
  active_hours_end: 22        # JST — wind down (no posts after 22:00)
  night_like_hours_start: 22  # 22:00-23:59: occasional likes only (human winding down)
  night_like_hours_end: 24
  night_like_max_per_cycle: 1 # Max 1 like per cycle during night window
  min_delay_between_actions_seconds: 15
  post_interval_minutes: 180  # Spontaneous post every ~3 hours

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  max_tokens_per_decision: 500
  max_tokens_per_generation: 1000
  # API key read from environment: ANTHROPIC_API_KEY

browser:
  headless: true
  timeout_ms: 15000
  screenshot_on_error: true

interest:
  min_relevance_score: 0.2   # Lower to catch more coffee content
  max_tweets_per_cycle: 6    # Up to 6 likes per cycle
